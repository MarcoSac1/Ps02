services:
  pihole:
    image: pihole/pihole:latest 
    ports: 
      - "7070:53/tcp"
      - "7070:53/udp"
      - "8080:80/tcp"
      - "443:443/tcp"
    environment:
      file: .env
    volumes:
      - ./etc-pihole/:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped